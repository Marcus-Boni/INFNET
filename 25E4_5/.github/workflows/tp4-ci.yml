name: TP4 CI/CD

on:
  push:
    paths:
      - "TP4/**"
      - ".github/workflows/tp4-ci.yml"
  pull_request:
    paths:
      - "TP4/**"
      - ".github/workflows/tp4-ci.yml"
  workflow_dispatch:
    inputs:
      runSelfHosted:
        description: "Executar também validação em runner self-hosted"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  build-test:
    name: Build + Test + Coverage (GitHub Hosted)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: TP4
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.7"

      - name: Build, test and coverage gate
        run: gradle clean check jacocoTestReport --stacktrace

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tp4-test-reports
          path: |
            TP4/build/reports/tests/test
            TP4/build/test-results/test

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tp4-jacoco-reports
          path: |
            TP4/build/reports/jacoco/test/html
            TP4/build/reports/jacoco/test/jacocoTestReport.xml

  self-hosted-validation:
    name: Validation (Self-Hosted)
    if: github.event_name == 'workflow_dispatch' && inputs.runSelfHosted == true
    runs-on: self-hosted
    defaults:
      run:
        working-directory: TP4
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify Java available
        run: java -version

      - name: Verify Gradle available
        run: gradle -v

      - name: Build and test on self-hosted
        run: gradle clean check --stacktrace
